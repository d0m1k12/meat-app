<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>М'ясна Лавка: Управління</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Панель управління</h1>
        </header>

        <section class="card card-stock">
            <div class="card-header">
                <h2>📦 Склад (Надходження)</h2>
            </div>
            <div class="input-group">
                <select id="stockMeatType" class="input-field">
                    <option value="Хрящ">Хрящ</option>
                    <option value="Фарш">Фарш</option>
                    <option value="Ошийок">Ошийок</option>
                    <option value="Ребра">Ребра</option>
                </select>
                <input type="number" id="stockAddWeight" class="input-field" placeholder="Додати вагу (кг)">
                <input type="number" id="buyPrice" class="input-field" placeholder="Ціна закупівлі (грн/кг)">
            </div>
            <button onclick="updateStock()" class="btn btn-stock">Оновити склад</button>
            <button onclick="clearStock()" class="btn btn-clear-stock">🗑 Очистити склад</button>
            
            <div id="stockDisplay" class="stock-display">
                </div>
        </section>

        <section class="card card-order">
            <div class="card-header">
                <h2>👤 Нове замовлення</h2>
            </div>
            
            <input type="text" id="clientName" class="input-field" placeholder="Ім'я клієнта" list="savedClients" oninput="autoFillPhone()">
            <datalist id="savedClients"></datalist> <input type="tel" id="clientPhone" class="input-field" placeholder="Номер телефону">
            
            <select id="orderMeatType" class="input-field">
                <option value="Хрящ">Хрящ</option>
                <option value="Фарш">Фарш</option>
                <option value="Ошийок">Ошийок</option>
                <option value="Ребра">Ребра</option>
            </select>

            <input type="number" id="orderWeight" class="input-field" placeholder="Вага замовлення (кг)">
            <input type="number" id="salePrice" class="input-field" placeholder="Ціна продажу (грн/кг)">
            <button onclick="addOrder()" class="btn btn-order">Додати замовлення</button>
        </section>

        <section class="card card-history">
            <div class="card-header">
                <h2>📋 Поточні замовлення</h2>
            </div>
            <div id="ordersList"></div>
            <div class="summary">
                <p>Загальна вигода: <strong id="totalProfit">0</strong> грн</p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
