<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>М'ясна Лавка: Управління</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Управління замовленнями</h1>
        </header>

        <section class="card">
            <h2>📦 Склад (Залишок)</h2>
            <div class="input-group">
                <input type="number" id="stockWeight" placeholder="Всього м'яса (кг)">
                <input type="number" id="buyPrice" placeholder="Ціна закупівлі (грн/кг)">
            </div>
            <p>Залишилось: <span id="remainingStock">0</span> кг</p>
        </section>

        <section class="card">
            <h2>👤 Нове замовлення</h2>
            <input type="text" id="clientName" placeholder="Ім'я клієнта">
            <input type="number" id="orderWeight" placeholder="Вага замовлення (кг)">
            <input type="number" id="margin" placeholder="Націнка (%)" value="20">
            <button onclick="addOrder()" class="btn-main">Додати замовлення</button>
        </section>

        <section class="card">
            <h2>📋 Поточні замовлення</h2>
            <div id="ordersList"></div>
            <div class="summary">
                <p>Загальна вигода: <strong id="totalProfit">0</strong> грн</p>
            </div>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
